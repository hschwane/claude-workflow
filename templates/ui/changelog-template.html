<!--
  In-app changelog template (see ../preferences/changelog.md for the requirements this implements).

  Self-contained: no build step, no external dependencies. Drop into the app as its own
  page/view/route, then:
    1. Replace the CSS custom properties in the "APP THEME" block below with the app's own
       design tokens (colors, font, radius, spacing) — that's the whole re-skin.
    2. Point CHANGELOG_ENDPOINT / VERSIONS_ENDPOINT at the app's real backend routes (see the
       API CONTRACT comment below). Until then this renders the embedded DEMO_DATA so the page
       is inspectable standalone.
    3. Wire up navigation to/from wherever the app shows its version or update control.
-->
<title>Changelog</title>
<style>
  /* ---------------- APP THEME — replace these with the app's real tokens ---------------- */
  :root {
    --cl-bg: #ffffff;
    --cl-bg-alt: #f6f7f9;
    --cl-card-bg: #ffffff;
    --cl-card-border: #e3e5e9;
    --cl-text: #1a1d23;
    --cl-text-muted: #6b7280;
    --cl-accent: #4f46e5;
    --cl-accent-contrast: #ffffff;
    --cl-added: #1a7f37;
    --cl-added-bg: #dafbe1;
    --cl-changed: #9a6700;
    --cl-changed-bg: #fff8c5;
    --cl-fixed: #b91c1c;
    --cl-fixed-bg: #fee2e2;
    --cl-radius: 10px;
    --cl-font: system-ui, -apple-system, "Segoe UI", sans-serif;
    --cl-mark-bg: #fde68a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --cl-bg: #16181d;
      --cl-bg-alt: #1d2026;
      --cl-card-bg: #1d2026;
      --cl-card-border: #2c3038;
      --cl-text: #e7e9ec;
      --cl-text-muted: #9aa1ac;
      --cl-accent: #818cf8;
      --cl-accent-contrast: #16181d;
      --cl-added: #4ade80;
      --cl-added-bg: #123321;
      --cl-changed: #facc15;
      --cl-changed-bg: #3a2f05;
      --cl-fixed: #f87171;
      --cl-fixed-bg: #3a1414;
      --cl-mark-bg: #7c6a1c;
    }
  }
  :root[data-theme="dark"] {
    --cl-bg: #16181d; --cl-bg-alt: #1d2026; --cl-card-bg: #1d2026; --cl-card-border: #2c3038;
    --cl-text: #e7e9ec; --cl-text-muted: #9aa1ac; --cl-accent: #818cf8; --cl-accent-contrast: #16181d;
    --cl-added: #4ade80; --cl-added-bg: #123321; --cl-changed: #facc15; --cl-changed-bg: #3a2f05;
    --cl-fixed: #f87171; --cl-fixed-bg: #3a1414; --cl-mark-bg: #7c6a1c;
  }
  :root[data-theme="light"] {
    --cl-bg: #ffffff; --cl-bg-alt: #f6f7f9; --cl-card-bg: #ffffff; --cl-card-border: #e3e5e9;
    --cl-text: #1a1d23; --cl-text-muted: #6b7280; --cl-accent: #4f46e5; --cl-accent-contrast: #ffffff;
    --cl-added: #1a7f37; --cl-added-bg: #dafbe1; --cl-changed: #9a6700; --cl-changed-bg: #fff8c5;
    --cl-fixed: #b91c1c; --cl-fixed-bg: #fee2e2; --cl-mark-bg: #fde68a;
  }

  /* ---------------- structure (adjust freely, tokens above drive the look) ---------------- */
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--cl-bg); color: var(--cl-text); font-family: var(--cl-font);
  }
  .cl-page { max-width: 760px; margin: 0 auto; padding: 24px 16px 80px; }
  .cl-header { position: sticky; top: 0; background: var(--cl-bg); padding: 8px 0 16px; z-index: 5; }
  .cl-title { font-size: 1.4rem; font-weight: 700; margin: 0 0 12px; }
  .cl-controls { display: flex; flex-wrap: wrap; gap: 8px; }
  .cl-search {
    flex: 1 1 220px; padding: 8px 12px; border-radius: var(--cl-radius);
    border: 1px solid var(--cl-card-border); background: var(--cl-bg-alt); color: var(--cl-text);
    font: inherit;
  }
  .cl-version-filter { display: flex; gap: 6px; align-items: center; font-size: 0.85rem; color: var(--cl-text-muted); }
  .cl-version-filter select {
    padding: 6px 8px; border-radius: var(--cl-radius); border: 1px solid var(--cl-card-border);
    background: var(--cl-bg-alt); color: var(--cl-text); font: inherit;
  }

  .cl-release { border: 1px solid var(--cl-card-border); background: var(--cl-card-bg);
    border-radius: var(--cl-radius); margin-bottom: 16px; overflow: hidden; }
  .cl-release-head { display: flex; align-items: baseline; gap: 10px; padding: 12px 16px;
    border-bottom: 1px solid var(--cl-card-border); background: var(--cl-bg-alt); }
  .cl-release-version { font-weight: 700; font-size: 1.05rem; }
  .cl-release-date { color: var(--cl-text-muted); font-size: 0.85rem; }

  .cl-entry-list { list-style: none; margin: 0; padding: 8px 16px 14px; }
  .cl-entry { display: flex; gap: 10px; align-items: flex-start; padding: 6px 0; }
  .cl-tag { flex: 0 0 auto; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.03em; padding: 2px 8px; border-radius: 999px; margin-top: 2px; }
  .cl-tag-added { color: var(--cl-added); background: var(--cl-added-bg); }
  .cl-tag-changed { color: var(--cl-changed); background: var(--cl-changed-bg); }
  .cl-tag-fixed { color: var(--cl-fixed); background: var(--cl-fixed-bg); }
  .cl-entry-body { flex: 1 1 auto; }
  .cl-entry-text mark { background: var(--cl-mark-bg); color: inherit; border-radius: 3px; }
  .cl-entry-ticket { color: var(--cl-text-muted); font-size: 0.78rem; margin-left: 6px; }

  .cl-empty, .cl-status { text-align: center; color: var(--cl-text-muted); padding: 24px 0; font-size: 0.9rem; }
  .cl-sentinel { height: 1px; }
</style>

<div class="cl-page">
  <div class="cl-header">
    <h1 class="cl-title">Changelog</h1>
    <div class="cl-controls">
      <input class="cl-search" type="search" placeholder="Search changes…" aria-label="Search changelog" />
      <div class="cl-version-filter">
        from <select class="cl-version-from" aria-label="From version"></select>
        to <select class="cl-version-to" aria-label="To version"></select>
      </div>
    </div>
  </div>

  <div class="cl-releases"></div>
  <div class="cl-status" hidden></div>
  <div class="cl-sentinel"></div>
</div>

<script>
(function () {
  "use strict";

  /* =========================================================================================
   * API CONTRACT — replace these two endpoints with the app's real backend routes.
   *
   * GET {VERSIONS_ENDPOINT}
   *   -> { "versions": ["1.0.0", "1.1.0", "1.2.0", ...] }   // ascending, used to fill the
   *      from/to <select> filters without loading every entry up front.
   *
   * GET {CHANGELOG_ENDPOINT}?cursor=<opaque|omit for first page>&limit=<n>
   *                          &search=<optional>&versionFrom=<optional>&versionTo=<optional>
   *   -> {
   *        "releases": [
   *          { "version": "1.4.0", "date": "2026-07-01", "entries": [
   *              { "type": "added" | "changed" | "fixed", "ticket": "FEAT-042", "text": "…" }
   *          ] }
   *        ],
   *        "nextCursor": "opaque-string-or-null"   // null/absent means no more pages
   *      }
   *   Releases are returned newest-first. Filtering/search happens server-side so pagination
   *   and bandwidth savings hold even with an active filter.
   * ========================================================================================= */
  var CHANGELOG_ENDPOINT = "/api/changelog";
  var VERSIONS_ENDPOINT = "/api/changelog/versions";
  var PAGE_SIZE = 10;
  var SEARCH_DEBOUNCE_MS = 250;

  // Demo data so the template is inspectable before the endpoints exist. Delete once wired up.
  var DEMO_DATA = {
    versions: ["1.0.0", "1.1.0", "1.2.0"],
    releases: [
      { version: "1.2.0", date: "2026-07-20", entries: [
        { type: "added", ticket: "FEAT-031", text: "Offline map region downloads with a progress indicator." },
        { type: "changed", ticket: "FEAT-028", text: "Search results now rank by distance first." },
        { type: "fixed", ticket: "BUG-014", text: "Fixed marker clustering flicker while zooming." }
      ]},
      { version: "1.1.0", date: "2026-06-02", entries: [
        { type: "added", ticket: "FEAT-019", text: "Dark mode support across all views." },
        { type: "fixed", ticket: "BUG-009", text: "Fixed crash when opening settings offline." }
      ]},
      { version: "1.0.0", date: "2026-05-01", entries: [
        { type: "added", ticket: "FEAT-001", text: "Initial release." }
      ]}
    ]
  };

  var releasesEl = document.querySelector(".cl-releases");
  var statusEl = document.querySelector(".cl-status");
  var sentinelEl = document.querySelector(".cl-sentinel");
  var searchEl = document.querySelector(".cl-search");
  var fromEl = document.querySelector(".cl-version-from");
  var toEl = document.querySelector(".cl-version-to");

  var state = { cursor: null, loading: false, done: false, search: "", versionFrom: "", versionTo: "" };

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function highlight(text, term) {
    var safe = escapeHtml(text);
    if (!term) return safe;
    var esc = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return safe.replace(new RegExp("(" + esc + ")", "ig"), "<mark>$1</mark>");
  }

  function renderRelease(release, term) {
    var entries = release.entries.filter(function (e) {
      return !term || e.text.toLowerCase().indexOf(term.toLowerCase()) !== -1;
    });
    if (!entries.length) return null;

    var wrap = document.createElement("section");
    wrap.className = "cl-release";
    wrap.innerHTML =
      '<div class="cl-release-head">' +
        '<span class="cl-release-version">v' + escapeHtml(release.version) + "</span>" +
        '<span class="cl-release-date">' + escapeHtml(release.date) + "</span>" +
      "</div>" +
      '<ul class="cl-entry-list">' +
        entries.map(function (e) {
          return (
            '<li class="cl-entry">' +
              '<span class="cl-tag cl-tag-' + e.type + '">' + e.type + "</span>" +
              '<span class="cl-entry-body">' +
                '<span class="cl-entry-text">' + highlight(e.text, term) + "</span>" +
                (e.ticket ? '<span class="cl-entry-ticket">' + escapeHtml(e.ticket) + "</span>" : "") +
              "</span>" +
            "</li>"
          );
        }).join("") +
      "</ul>";
    return wrap;
  }

  function setStatus(text) {
    statusEl.hidden = !text;
    statusEl.textContent = text || "";
  }

  async function fetchPage() {
    var params = new URLSearchParams();
    if (state.cursor) params.set("cursor", state.cursor);
    params.set("limit", PAGE_SIZE);
    if (state.search) params.set("search", state.search);
    if (state.versionFrom) params.set("versionFrom", state.versionFrom);
    if (state.versionTo) params.set("versionTo", state.versionTo);

    try {
      var res = await fetch(CHANGELOG_ENDPOINT + "?" + params.toString());
      if (!res.ok) throw new Error("bad response");
      return await res.json();
    } catch (err) {
      // Fallback to demo data (first page only) so the template renders standalone.
      if (state.cursor) return { releases: [], nextCursor: null };
      return { releases: DEMO_DATA.releases, nextCursor: null };
    }
  }

  async function loadMore() {
    if (state.loading || state.done) return;
    state.loading = true;
    setStatus("Loading…");

    var page = await fetchPage();
    var term = state.search;
    var appended = 0;
    page.releases.forEach(function (release) {
      var el = renderRelease(release, term);
      if (el) { releasesEl.appendChild(el); appended++; }
    });

    state.cursor = page.nextCursor || null;
    state.done = !state.cursor;
    state.loading = false;
    setStatus(state.done && releasesEl.children.length === 0 ? "No matching changes." : "");
  }

  function resetAndReload() {
    releasesEl.innerHTML = "";
    state.cursor = null;
    state.done = false;
    loadMore();
  }

  async function loadVersionOptions() {
    var versions;
    try {
      var res = await fetch(VERSIONS_ENDPOINT);
      if (!res.ok) throw new Error("bad response");
      versions = (await res.json()).versions;
    } catch (err) {
      versions = DEMO_DATA.versions;
    }
    [fromEl, toEl].forEach(function (sel) {
      sel.innerHTML = '<option value="">any</option>' +
        versions.map(function (v) { return '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + "</option>"; }).join("");
    });
  }

  var searchTimer = null;
  searchEl.addEventListener("input", function () {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function () {
      state.search = searchEl.value.trim();
      resetAndReload();
    }, SEARCH_DEBOUNCE_MS);
  });

  [fromEl, toEl].forEach(function (sel) {
    sel.addEventListener("change", function () {
      state.versionFrom = fromEl.value;
      state.versionTo = toEl.value;
      resetAndReload();
    });
  });

  new IntersectionObserver(function (entries) {
    if (entries[0].isIntersecting) loadMore();
  }, { rootMargin: "200px" }).observe(sentinelEl);

  loadVersionOptions();
  loadMore();
})();
</script>
