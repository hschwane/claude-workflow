# Release workflow — the FALLBACK path. By default `/release` runs scripts/release.sh
# LOCALLY (release-runner: local) and this only runs on manual dispatch.
# Only if release-runner: ci — uncomment the tag trigger below.
# NOTE: never enable BOTH local release and the tag trigger — you'd release twice.
name: Release
on:
  workflow_dispatch:
    inputs:
      version: { description: "version to release (e.g. 1.2.0)", required: true }
  # push:
  #   tags: ["v*"]        # enable ONLY for release-runner: ci
jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      # Add language toolchain setup here if the build needs it.
      - run: bash scripts/release.sh "${{ github.event.inputs.version || github.ref_name }}"
        env:
          GH_TOKEN: ${{ github.token }}
