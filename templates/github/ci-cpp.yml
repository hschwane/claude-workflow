name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  ci:
    name: Build, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy clang-format cmake ninja-build

      - name: Configure (Debug with sanitizers)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: clang-tidy
        run: |
          cmake -B build-tidy -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_CLANG_TIDY="clang-tidy;-p;build-tidy"
          OUTPUT=$(cmake --build build-tidy 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qE "warning:|error:"; then
            echo "clang-tidy found issues — failing the build."
            exit 1
          fi

      - name: clang-format check
        run: find src tests -name "*.cpp" -o -name "*.h" | xargs clang-format --dry-run --Werror
