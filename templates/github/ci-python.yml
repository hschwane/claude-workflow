# Thin wrapper around scripts/ci.sh — same checks Claude runs locally (parity).
# Claude's commits carry [skip ci] (native), so this runs on HUMAN commits + manual dispatch.
# Do NOT mark this a required status check: [skip ci] leaves required checks Pending forever.
name: CI
on:
  push:
    branches: [main, master, develop]
    paths-ignore: ["docs/**", "**/*.md", ".claude/**"]
  pull_request:
    paths-ignore: ["docs/**", "**/*.md", ".claude/**"]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install -e ".[dev]" || pip install -r requirements-dev.txt
      - run: bash scripts/ci.sh full
