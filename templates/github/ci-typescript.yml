name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  ci:
    name: Lint, Type-check, Test, Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Tests
        run: npm test -- --coverage

      - name: Security audit
        # high+ blocks the build; moderate findings in transitive deps are often unfixable
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build
