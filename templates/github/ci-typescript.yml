# Thin wrapper around scripts/ci.sh — same checks Claude runs locally (parity).
# Claude's commits carry [skip ci] (native), so this runs on HUMAN commits + manual dispatch.
# Do NOT mark this a required status check: [skip ci] leaves required checks Pending forever.
name: CI
on:
  push:
    branches: [main, master, develop]
    paths-ignore: ["docs/**", "**/*.md", ".claude/**"]
  pull_request:
    paths-ignore: ["docs/**", "**/*.md", ".claude/**"]
  workflow_dispatch:        # manual backup — Claude can trigger when a local run can't
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "npm" }
      - run: npm ci
      - run: bash scripts/ci.sh full
