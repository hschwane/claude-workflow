# Release workflow — the FALLBACK path. By default `/release` runs scripts/release.sh
# LOCALLY (release-runner: local) and this only runs on manual dispatch.
# Dispatch-only: /release triggers this in ci mode. Never add a tag trigger — the local
# /release always pushes the version tag, so a tag trigger would double-publish.
name: Release
on:
  workflow_dispatch:
    inputs:
      version: { description: "version to release (e.g. 1.2.0)", required: true }
jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "npm", registry-url: "https://registry.npmjs.org" }
      - run: npm ci
      # Same entrypoint Claude runs locally — parity. VERSION from dispatch input or the tag.
      - run: bash scripts/release.sh "${{ github.event.inputs.version }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
