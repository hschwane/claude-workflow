# Release workflow — the FALLBACK path. By default `/release` runs scripts/release.sh
# LOCALLY (release-runner: local) and this only runs on manual dispatch.
# Only if release-runner: ci (isolate publish secrets, or need npm provenance/OIDC) —
# uncomment the tag trigger below so a pushed v* tag runs the publish here instead.
# NOTE: never enable BOTH local release and the tag trigger — you'd publish twice.
name: Release
on:
  workflow_dispatch:
    inputs:
      version: { description: "version to release (e.g. 1.2.0)", required: true }
  # push:
  #   tags: ["v*"]        # enable ONLY for release-runner: ci
jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "npm", registry-url: "https://registry.npmjs.org" }
      - run: npm ci
      # Same entrypoint Claude runs locally — parity. VERSION from dispatch input or the tag.
      - run: bash scripts/release.sh "${{ github.event.inputs.version || github.ref_name }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
